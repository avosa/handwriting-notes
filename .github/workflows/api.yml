# The api service's gate and image build. It runs only when the service changes, so a web-only change
# never waits on it. The gate mirrors `make check`; a green run means the service is formatted, vets,
# tests, and builds into its container.
name: api

on:
  push:
    branches: [main]
    paths: ['api/**', '.github/workflows/api.yml']
  pull_request:
    paths: ['api/**', '.github/workflows/api.yml']

defaults:
  run:
    working-directory: api

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: api/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
      - name: build
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/api .

  image:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker build -t notes-api .
