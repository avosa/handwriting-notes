<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Hold the page to its own code and assets. Scripts run only from this origin (with the
         WebAssembly the on-device transcriber needs); images may be inline data or blobs for
         attachments and snapshots; the note may reach any AI provider over https with the
         reader's own key; workers may come from blobs. Nothing may be framed or embedded. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: data: blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/brand/nib_logo_light.png" />
    <link rel="apple-touch-icon" href="/brand/nib_logo_light.png" />
    <meta name="theme-color" content="#ece7dc" />
    <meta name="description" content="Turn your typed notes into neat handwriting on real ruled paper." />
    <title>Notes — Handwriting Notes</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
